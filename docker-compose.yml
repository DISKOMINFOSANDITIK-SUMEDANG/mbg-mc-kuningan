services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mbg-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-mbg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mbg_password}
      POSTGRES_DB: ${DB_NAME:-mbg_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${FRONTEND_SOURCE_DIR}/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ${FRONTEND_SOURCE_DIR}/database/auth-schema.sql:/docker-entrypoint-initdb.d/02-auth-schema.sql
      - ${FRONTEND_SOURCE_DIR}/database/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
      - ${FRONTEND_SOURCE_DIR}/database/migrations/001_add_supplier_management.sql:/docker-entrypoint-initdb.d/04-add-supplier-management.sql
      - ${FRONTEND_SOURCE_DIR}/database/migrations/001_add_stock_and_sales_system.sql:/docker-entrypoint-initdb.d/05-add-stock-and-sales-system.sql
      - ${FRONTEND_SOURCE_DIR}/database/migrations/002_add_sppg_is_active.sql:/docker-entrypoint-initdb.d/06-add-sppg-is-active.sql
      - ${FRONTEND_SOURCE_DIR}/database/migrations/003_add_offtaker_management.sql:/docker-entrypoint-initdb.d/07-add-offtaker-management.sql
      - ${BACKEND_SOURCE_DIR}/src/db/migrations/001_user_profiles_unique_user_id.sql:/docker-entrypoint-initdb.d/08-user-profiles-unique-user-id.sql
      - ${BACKEND_SOURCE_DIR}/src/db/migrations/002_menu_items_nullable_nutrition.sql:/docker-entrypoint-initdb.d/09-menu-items-nullable-nutrition.sql
      - ${BACKEND_SOURCE_DIR}/src/db/migrations/003_laporan_pesan_tujuan.sql:/docker-entrypoint-initdb.d/10-laporan-pesan-tujuan.sql
      - ${BACKEND_SOURCE_DIR}/src/db/migrations/004_sppgs_add_is_active.sql:/docker-entrypoint-initdb.d/11-sppgs-add-is-active.sql
    networks:
      - mbg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mbg_user} -d ${DB_NAME:-mbg_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO Object Storage
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-06-13T11-33-47Z-cpuv1}
    container_name: mbg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mbgadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mbgadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./object-storage:/data
    networks:
      - mbg-network
    restart: unless-stopped

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1}
    container_name: mbg-minio-init
    # One-shot setup job. Exited (0) means the bucket was created successfully.
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mbgadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mbgadmin123}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        attempts=0
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          if [ "$$attempts" -ge 60 ]; then
            echo "MinIO is not ready after 120 seconds."
            exit 1
          fi
          echo "Waiting for MinIO... ($$attempts/60)"
          sleep 2
        done
        echo "MinIO is ready."
        mc mb --ignore-existing local/${S3_BUCKET:-mbg-storage}
        mc anonymous set download local/${S3_BUCKET:-mbg-storage}
        echo "MinIO bucket ${S3_BUCKET:-mbg-storage} is ready."
    networks:
      - mbg-network
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mbg-nginx
    environment:
      NGINX_SSL_ENABLED: ${NGINX_SSL_ENABLED:-false}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - mbg-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend API (Express.js + TypeScript)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ${BACKEND_SOURCE_DIR}
      dockerfile: Dockerfile
    container_name: mbg-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-mbg_user}:${DB_PASSWORD:-mbg_password}@postgres:5432/${DB_NAME:-mbg_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3000,http://localhost:3001,https://localhost,http://192.168.18.155,http://192.168.18.155:80,http://192.168.18.155:3000}
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      UPLOADS_DIR: ${UPLOADS_DIR:-./uploads}
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-http://localhost:3001/uploads}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-30000}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-5000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-120000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-mbgadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-mbgadmin123}
      S3_BUCKET: ${S3_BUCKET:-mbg-storage}
      S3_BUCKET_PREFIX: ${S3_BUCKET_PREFIX:-stub/mbg_bucket}
      S3_PHOTO_BUCKET_PREFIX: ${S3_PHOTO_BUCKET_PREFIX:-stub}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:3001/storage}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      # Persist uploaded files when local storage is used.
      - ${BACKEND_SOURCE_DIR}/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - mbg-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend (Next.js production server)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ${FRONTEND_SOURCE_DIR}
      dockerfile: Dockerfile
    container_name: mbg-frontend
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://backend:3001}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://backend:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_STORAGE_BASE_URL: ${NEXT_PUBLIC_STORAGE_BASE_URL:-http://localhost/storage}
      NEXT_PUBLIC_STORAGE_BUCKET: ${NEXT_PUBLIC_STORAGE_BUCKET:-mbg-storage}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - mbg-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # pgAdmin (optional - database management)
  # ─────────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mbg-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mbg.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - mbg-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  mbg-network:
    driver: bridge
